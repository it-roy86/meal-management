# ========================
# PostgreSQL \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC124\uC815
# ========================

# PostgreSQL \uC11C\uBC84 \uC8FC\uC18C\uC640 \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC774\uB984
spring.datasource.url=jdbc:postgresql://localhost:5432/meal_management

# PostgreSQL \uC811\uC18D \uACC4\uC815
spring.datasource.username=postgres

# PostgreSQL \uC811\uC18D \uBE44\uBC00\uBC88\uD638 (\uC124\uCE58 \uC2DC \uC124\uC815\uD55C \uBE44\uBC00\uBC88\uD638)
spring.datasource.password=1265

# ========================
# JPA \uC124\uC815
# ========================

# JPA\uAC00 \uC0AC\uC6A9\uD558\uB294 DB \uBC29\uC5B8 \uC124\uC815 (PostgreSQL \uBB38\uBC95\uC73C\uB85C \uCFFC\uB9AC \uC0DD\uC131)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# \uC11C\uBC84 \uC2E4\uD589 \uC2DC Entity \uAE30\uBC18\uC73C\uB85C \uD14C\uC774\uBE14 \uC790\uB3D9 \uC0DD\uC131/\uC218\uC815
# create: \uB9E4\uBC88 \uC0C8\uB85C \uC0DD\uC131 (\uAE30\uC874 \uB370\uC774\uD130 \uC0AD\uC81C\uB428)
# update: \uBCC0\uACBD\uB41C \uBD80\uBD84\uB9CC \uBC18\uC601 (\uAE30\uC874 \uB370\uC774\uD130 \uC720\uC9C0) \u2190 \uD604\uC7AC \uC124\uC815
# validate: \uD14C\uC774\uBE14 \uAD6C\uC870\uB9CC \uAC80\uC0AC
# none: \uC544\uBB34\uAC83\uB3C4 \uC548 \uD568
spring.jpa.hibernate.ddl-auto=update

# \uC2E4\uD589\uB418\uB294 SQL \uCFFC\uB9AC\uB97C \uCF58\uC194\uC5D0 \uCD9C\uB825 (\uAC1C\uBC1C \uC2DC \uB514\uBC84\uAE45\uC6A9)
spring.jpa.show-sql=true

# ========================
# \uC11C\uBC84 \uC124\uC815
# ========================

# Spring Boot \uC11C\uBC84 \uD3EC\uD2B8 (Vue.js\uB294 5173, Spring Boot\uB294 8080)
server.port=8080

# ========================
# \uB514\uBC84\uADF8 \uB85C\uADF8 \uC124\uC815
# ========================

# Spring Security \uB514\uBC84\uADF8 \uB85C\uADF8 \uD65C\uC131\uD654
# 403 \uC5D0\uB7EC \uB4F1 \uBCF4\uC548 \uAD00\uB828 \uBB38\uC81C \uBC1C\uC0DD \uC2DC \uC6D0\uC778\uC744 \uCF58\uC194\uC5D0\uC11C \uD655\uC778\uD560 \uC218 \uC788\uC5B4\uC694
# \uBB38\uC81C \uD574\uACB0 \uD6C4\uC5D0\uB294 \uC0AD\uC81C\uD558\uAC70\uB098 INFO\uB85C \uBCC0\uACBD\uD558\uB294 \uAC8C \uC88B\uC544\uC694
logging.level.org.springframework.security=DEBUG